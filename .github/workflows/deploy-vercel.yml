name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check Vercel secrets
        id: check-secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_TEAM_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "Vercel deployment skipped because one or more required secrets are missing."
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Vercel deploy
        if: steps.check-secrets.outputs.has_secrets != 'true'
        run: echo "Skipping Vercel deployment because required secrets are not configured."

      - name: Deploy to Vercel
        if: steps.check-secrets.outputs.has_secrets == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-version: latest
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_TEAM_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: "--prod"
